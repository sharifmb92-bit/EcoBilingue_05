<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Eco Nativo - Baleares Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-idle: #0a0a0a;
            --color-driver: #fbbf24; /* ÁMBAR */
            --color-client: #38bdf8; /* AZUL */
            --color-muted: #64748b; 
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body { 
            background-color: var(--bg-idle); color: white; margin: 0; 
            display: flex; flex-direction: column; 
            height: 100vh; height: 100dvh; overflow: hidden;
            transition: background-color 0.6s ease;
        }

        /* 3 ESTADOS VISUALES DE SEGURIDAD */
        body.mode-driver { background-color: #2b1d00; } /* ÁMBAR: Habla Conductor */
        body.mode-client { background-color: #001a35; } /* AZUL: Habla Cliente */
        body.mode-idle { background-color: var(--bg-idle); } /* REPOSO */

        header { 
            padding: calc(20px + env(safe-area-inset-top)) 20px 10px; 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.3); z-index: 10;
        }

        .medbasha-sign { font-size: 8px; letter-spacing: 2px; opacity: 0.4; font-weight: bold; }
        .toponym-shield { font-size: 9px; color: #22c55e; font-weight: 800; letter-spacing: 1px; }

        .display-area {
            flex: 1; display: flex; flex-direction: column; justify-content: center; 
            padding: 30px; text-align: center;
        }
        #main-display {
            font-size: 46px; font-weight: 900; line-height: 1.1; letter-spacing: -1px;
        }
        #sub-display { font-size: 18px; margin-top: 25px; font-weight: 500; opacity: 0.7; color: #cbd5e1; }

        .quick-actions-container {
            padding: 10px 0; background: rgba(0,0,0,0.4); border-top: 1px solid rgba(255,255,255,0.1);
        }
        .category-label {
            font-size: 10px; font-weight: 900; color: #94a3b8; 
            margin-left: 20px; text-transform: uppercase; letter-spacing: 1px;
        }
        .quick-actions {
            display: flex; gap: 10px; overflow-x: auto; padding: 12px 20px;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .q-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 14px 22px; border-radius: 16px; white-space: nowrap; 
            font-size: 14px; font-weight: bold;
        }

        .control-panel {
            background: #1e293b;
            padding: 20px 25px calc(60px + env(safe-area-inset-bottom)); 
            border-radius: 35px 35px 0 0;
            box-shadow: 0 -15px 50px rgba(0,0,0,0.9);
            z-index: 100;
        }

        .lang-selector { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; align-items: center; }
        .l-flag { 
            font-size: 30px; background: none; border: none; cursor: pointer; 
            filter: grayscale(1); transition: 0.3s;
        }
        .l-flag.active { filter: grayscale(0); transform: scale(1.3); }
        
        .btn-auto-detect {
            background: #22c55e; color: white; border: none; padding: 6px 14px;
            border-radius: 10px; font-size: 11px; font-weight: 900; cursor: pointer;
            margin-left: 10px; text-transform: uppercase;
        }
        .btn-auto-detect.active { box-shadow: 0 0 20px #22c55e; border: 2px solid white; }

        .master-btn {
            width: 100%; padding: 25px; border-radius: 22px; border: none;
            font-size: 18px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-stop { background: #ef4444; color: white; }
        .btn-start { background: var(--color-client); color: white; }

        .txt-driver { color: var(--color-driver); }
        .txt-client { color: var(--color-client); }
    </style>
</head>
<body id="app-body" class="mode-idle">

    <header>
        <div>
            <div style="font-weight: 900; font-size: 13px;">ECO NATIVO <span style="color:var(--color-client)">PRO</span></div>
            <div class="toponym-shield">🛡️ IDENTIDAD LOCAL PROTEGIDA</div>
        </div>
        <div class="medbasha-sign">MEDBASHA</div>
    </header>

    <div class="display-area">
        <div id="main-display">SISTEMA LISTO</div>
        <div id="sub-display">Operando en Menorca • Baleares</div>
    </div>

    <div class="quick-actions-container">
        <div class="category-label">Bienvenida</div>
        <div class="quick-actions">
            <button class="q-btn" onclick="forcePhrase('Hola, buenos días. ¿A qué hotel o urbanización vamos?')">👋 Bienvenida</button>
            <button class="q-btn" onclick="forcePhrase('¿Me puede confirmar la dirección exacta o el destino?')">📍 Destino?</button>
        </div>
        
        <div class="category-label" style="margin-top:10px">Ruta y Tráfico</div>
        <div class="quick-actions">
            <button class="q-btn" onclick="forcePhrase('Hay algo de tráfico en la carretera principal, tardaremos unos minutos más')">🚗 Tráfico</button>
            <button class="q-btn" onclick="forcePhrase('¿Le parece bien la temperatura del coche?')">🌡️ Temp.</button>
            <button class="q-btn" onclick="forcePhrase('¿Desea pagar con tarjeta o efectivo?')">💳 Pago</button>
        </div>
    </div>

    <div class="control-panel">
        <div class="lang-selector">
            <button class="l-flag active" id="flag-en" onclick="setLang('en', this)">🇬🇧</button>
            <button class="l-flag" id="flag-fr" onclick="setLang('fr', this)">🇫🇷</button>
            <button class="l-flag" id="flag-de" onclick="setLang('de', this)">🇩🇪</button>
            <button class="l-flag" id="flag-it" onclick="setLang('it', this)">🇮🇹</button>
            <button class="btn-auto-detect" id="btn-auto" onclick="enableAutoDetect()">AUTO ✨</button>
        </div>

        <button id="master-btn" class="master-btn btn-start" onclick="toggleSystem()">
            🎤 ACTIVAR ASISTENTE
        </button>
    </div>

    <script>
        let isRunning = false;
        let isAutoDetect = false;
        let turn = 'driver'; 
        let targetLang = 'en';
        
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.continuous = false;
        rec.interimResults = false;

        function setLang(l, el) {
            targetLang = l;
            isAutoDetect = false;
            document.getElementById('btn-auto').classList.remove('active');
            document.querySelectorAll('.l-flag').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function enableAutoDetect() {
            isAutoDetect = true;
            document.querySelectorAll('.l-flag').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-auto').classList.add('active');
            updateUI("MODO AUTO", "Detectaré el idioma al escuchar al cliente", "idle");
        }

        function toggleSystem() {
            isRunning = !isRunning;
            const btn = document.getElementById('master-btn');
            if(isRunning) {
                btn.innerText = "🛑 DETENER SISTEMA";
                btn.classList.replace('btn-start', 'btn-stop');
                turn = 'driver';
                startCycle();
            } else {
                btn.innerText = "🎤 ACTIVAR ASISTENTE";
                btn.classList.replace('btn-stop', 'btn-start');
                stopSystem();
            }
        }

        function stopSystem() {
            isRunning = false;
            rec.stop();
            window.speechSynthesis.cancel();
            updateUI("SISTEMA EN REPOSO", "Micro Desactivado", "idle");
        }

        async function startCycle() {
            if(!isRunning) return;
            const isDriver = turn === 'driver';
            rec.lang = isDriver ? 'es-ES' : (isAutoDetect ? 'en-GB' : getFullCode(targetLang));
            
            updateUI(
                isDriver ? "CONDUCTOR, HABLE..." : "ESCUCHANDO CLIENTE...", 
                isDriver ? "Habla en Español" : (isAutoDetect ? "Esperando idioma..." : "Passenger Turn"),
                isDriver ? "driver" : "client"
            );
            try { rec.start(); } catch(e) {}
        }

        rec.onresult = async (event) => {
            const text = event.results[0][0].transcript;
            let from, to;

            if (turn === 'driver') {
                from = 'es'; to = targetLang;
            } else {
                if (isAutoDetect) {
                    const detection = await detectLanguageIA(text);
                    if (detection && detection !== targetLang) {
                        targetLang = detection;
                        isAutoDetect = false;
                        updateFlagUI(detection);
                    }
                }
                from = targetLang; to = 'es';
            }
            
            let translated = await translateIA(text, from, to);
            updateUI(translated, text, turn === 'driver' ? "client" : "driver");

            speak(translated, turn === 'driver' ? getFullCode(targetLang) : 'es-ES', () => {
                if(isRunning) {
                    turn = (turn === 'driver') ? 'client' : 'driver';
                    setTimeout(startCycle, 800);
                }
            });
        };

        async function detectLanguageIA(text) {
            try {
                const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=autodetect|es`);
                const d = await r.json();
                const detected = d.responseData.detectedSourceLanguage;
                return ['en', 'fr', 'de', 'it'].includes(detected) ? detected : 'en';
            } catch { return 'en'; }
        }

        async function translateIA(text, from, to) {
            try {
                const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
                const d = await r.json();
                return d.responseData.translatedText;
            } catch { return "Traduciendo..."; }
        }

        function speak(text, lang, onEnd) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = lang; u.rate = 0.95; u.onend = onEnd;
            window.speechSynthesis.speak(u);
        }

        async function forcePhrase(spanishText) {
            if(!isRunning) toggleSystem();
            const translatedText = await translateIA(spanishText, 'es', targetLang);
            updateUI(translatedText, spanishText, "client");
            speak(translatedText, getFullCode(targetLang), () => {
                turn = 'client';
                startCycle();
            });
        }

        function updateUI(main, sub, mode) {
            const body = document.getElementById('app-body');
            const display = document.getElementById('main-display');
            body.className = "mode-" + mode;
            display.innerText = main;
            display.className = "txt-" + mode;
            document.getElementById('sub-display').innerText = sub;
        }

        function updateFlagUI(lang) {
            document.getElementById('btn-auto').classList.remove('active');
            document.querySelectorAll('.l-flag').forEach(b => b.classList.remove('active'));
            const flag = document.getElementById('flag-' + lang);
            if(flag) flag.classList.add('active');
        }

        function getFullCode(l) {
            return { 'en': 'en-GB', 'fr': 'fr-FR', 'de': 'de-DE', 'it': 'it-IT' }[l];
        }

        rec.onerror = () => isRunning && setTimeout(startCycle, 600);

        // REGISTRO DE SERVICE WORKER PARA PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Servicio PWA Baleares Activo'))
                .catch(err => console.error('Error PWA', err));
        }
    </script>
</body>
</html>
